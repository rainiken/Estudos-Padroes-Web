<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    Atributo
        Tag de Abertura <h1>
        Tag de Fechamento </h1>

    Atributos contém informação extra sobre o elemento que você não quer que
    apareça no conteúdo real. Aqui, class é o nome do atributo e editor-note é o
    valor do atributo.

    Um atributo sempre deve ter:
        - Um espaço entre ele e o nome do elemento.
        - O nome do atributo, seguido por um sinal de igual.
        - Aspas de abertura e fechamento, envolvendo todo o valor do atributo.
    -->
        <h1>One Piece</h1>

    <!--
    Imagens
    Isso incorpora uma imagem na nossa página na posição que aparece. Isso é
    feito pelo atributo src (source), que contém o caminho para nosso arquivo de
    imagem. Incluímos também um atributo alt (alternative).
    Um texto descritivo para usuários que não podem ver a imagem:
        - Eles são deficientes visuais.
        - Algo deu errado, fazendo com que a imagem não seja exibida.
        - O texto alternativo que você escreve deve fornecer ao leitor informações
    suficientes para ter uma boa ideia do que a imagem mostra.
    -->
        <img src="imagens/One_Piece_Logo.png" alt="One Piece" />

    <!--
    Cabeçalhos
    Os elementos de cabeçalhos permitem especificar que certas partes do seu
    conteúdo são títulos ou subtítulos.
    -->
        <h1>Título principal</h1>
        <h2>Título secundário</h2>
        <h3>Subtítulo</h3>
        <h4>Segundo Subtítulo</h4>
    
    <!--
    Parágrafo
    os elementos <p> são para conter parágrafos de texto.
    Você os usará com frequência ao marcar um conteúdo de texto regular.    
    -->
        <p>Este é um paragrafo simples</p>
    
    <!--
    Listas
    Muito do conteúdo da web é de listas e o HTML tem elementos especiais para
    elas. Listas de marcação sempre consistem em pelo menos 2 elementos.
    Os tipos mais comuns de lista são ordenadas e não ordenadas:
        - Listas não ordenadas. Essas são envolvidas em um elemento <ul>.
        - Listas Ordenadas. Essas são envolvidas em um elemento <ol>.    
    -->
        <ul>
            <li>Item de lista 1</li>
            <li>Item de lista 2</li>
            <li>Item de lista 3</li>
        </ul>

    <!--
    Links
    Links são muito importantes — eles são o que liga um conteúdo a um outro.
    Para adicionar um link, precisamos usar um elemento simples — <a> — "a" é
    a forma abreviada de "âncora".
    Para transformar uma parte do seu conteúdo em um link, siga estas etapas:
        <a>Se inscreva</a>

        <a href="">Se inscreva</a>

        <a href="http...">Se inscreva</a>
    -->
        <a href="https://one-piece.com/index.html">Visete o site oficial do One Piece</a>

    <!--
    Tabelas
    A estrutura de uma tabela começa com uma tag <table> que engloba toda a
    tabela. Depois, temos que criar as linhas com a tag <tr> que englobarão as
    tags <td> que são as células. Ainda podemos fazer com que as células
    superiores da tabela sejam o cabeçalho das colunas com a tag <th>.     
    -->
        <h2>Agenda de cursos do Franky</h2>
        <table>
            <tr>
                <th>Dia</th>
                <th>Curso</th>
                <th>Inscrição</th>
            </tr>
            <tr>
                <td>10</td>
                <td>Carpinteiro</td>
                <td>Registre</td>
            </tr>
        </table>    
</body>
</html>
